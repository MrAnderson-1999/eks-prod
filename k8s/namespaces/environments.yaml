# Environment namespaces for dev, staging, and production
# Each environment gets its own namespace for proper separation

apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    name: dev
    environment: development
    managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: stg
  labels:
    name: stg
    environment: staging
    managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: prod
  labels:
    name: prod
    environment: production
    managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
