apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-200-conf
  labels:
    app: nginx-200
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      default_type text/plain;
      location / {
        return 200 "ok\n";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-200
  labels:
    app: nginx-200
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-200
  template:
    metadata:
      labels:
        app: nginx-200
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: conf
          configMap:
            name: nginx-200-conf
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-200
  labels:
    app: nginx-200
spec:
  type: ClusterIP
  selector:
    app: nginx-200
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-200
  labels:
    app: nginx-200
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
    # HTTP only (no TLS)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-200
                port:
                  number: 80
